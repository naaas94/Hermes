name: CI

on:
  push:
    branches: [main, dev]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev,obs]"

      - name: Ruff
        run: ruff check .

      - name: Mypy
        run: mypy hermes/

      - name: Generate test fixtures
        run: python tests/generate_fixtures.py

      - name: Pytest
        run: pytest

      - name: Bench summary (main push, informational)
        id: bench
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        continue-on-error: true
        timeout-minutes: 5
        run: hermes bench --mock-llm --output benchmarks

      - name: Upload bench summary artifact
        if: >
          always() &&
          github.event_name == 'push' &&
          github.ref == 'refs/heads/main' &&
          steps.bench.outcome != 'skipped'
        uses: actions/upload-artifact@v4
        with:
          name: bench-summary-${{ github.sha }}
          path: benchmarks/*.json
          if-no-files-found: warn
